# KSA bound to the GCP SA via Workload Identity (see infra/terraform/iam.tf):
# pods running as this KSA get wallet-app@'s IAM permissions, no key files.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wallet
  namespace: default
  annotations:
    iam.gke.io/gcp-service-account: wallet-app@e-wallet-portfolio-4291.iam.gserviceaccount.com
